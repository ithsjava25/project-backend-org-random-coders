# Databas ? pekar pÕ lokal Docker-databas
spring.datasource.url=jdbc:postgresql://localhost:5432/vet1177
spring.datasource.username=vet1177_user
spring.datasource.password=vet1177_pass

# K÷r data.sql med testdata vid uppstart
spring.sql.init.data-locations=classpath:data.sql

# Visa mer SQL-info i dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MinIO ? lokal instans via Docker
aws.s3.endpoint=http://localhost:9000
aws.s3.access-key=minioadmin
aws.s3.secret-key=minioadmin
aws.s3.bucket-name=vet1177-attachments
aws.s3.region=eu-north-1

