spring.application.name=vet1177
spring.docker.compose.lifecycle-management=start_only

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

#Hibernate reads only our schema, change to validate later on
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.profiles.active=dev
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.platform=postgresql

# AWS S3 / MinIO Configuration
aws.s3.endpoint=${S3_ENDPOINT:}
aws.s3.access-key=${S3_ACCESS_KEY:}
aws.s3.secret-key=${S3_SECRET_KEY:}
aws.s3.bucket-name=${S3_BUCKET:}
aws.s3.region=${S3_REGION:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret-key=${JWT_SECRET:default-dev-secret-key-change-in-production-min-32-chars!!}
jwt.expiration-ms=86400000