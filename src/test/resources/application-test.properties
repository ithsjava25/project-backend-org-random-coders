# ============================================
# TEST-profil ? k÷rs av @ActiveProfiles("test")
# Anvõnds av integrationstester med @SpringBootTest
# ============================================

# Separat testdatabas ? aldrig dev-databasen
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.datasource.hikari.driver-class-name=org.h2.Driver

# Skapa schema frÕn scratch och rensa efter tester
spring.jpa.hibernate.ddl-auto=create-drop

# Hibernate creates schema automatically (schema.sql is NOT used in tests)
spring.sql.init.mode=never
spring.sql.init.data-locations=

# Stõng av Docker Compose i tester
# CI hanterar databasen som service container
spring.docker.compose.lifecycle-management=none

# MinIO ? testbucket
aws.s3.endpoint=
aws.s3.access-key=minioadmin
aws.s3.secret-key=minioadmin
aws.s3.bucket-name=vet1177-test-attachments
aws.s3.region=eu-north-1

# JWT ? dummyvõrden f÷r tester
jwt.secret=test-secret-key-minst-32-tecken-lang-for-tester
jwt.expiration-ms=86400000

# Mindre output i tester
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false