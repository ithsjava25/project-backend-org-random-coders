# ============================================
# TEST-profil ? k—rs av @ActiveProfiles("test")
# Anvðnds av integrationstester med @SpringBootTest
# ============================================

# Separat testdatabas ? aldrig dev-databasen
spring.datasource.url=jdbc:postgresql://localhost:5432/vet1177_test
spring.datasource.username=vet1177_user
spring.datasource.password=vet1177_pass

# Skapa schema frÍn scratch och rensa efter tester
spring.jpa.hibernate.ddl-auto=create-drop

# K—r schema.sql men INTE data.sql
spring.sql.init.mode=always
spring.sql.init.data-locations=

# Stðng av Docker Compose i tester
# CI hanterar databasen som service container
spring.docker.compose.lifecycle-management=none

# MinIO ? testbucket
aws.s3.endpoint=http://localhost:9000
aws.s3.access-key=minioadmin
aws.s3.secret-key=minioadmin
aws.s3.bucket-name=vet1177-test-attachments
aws.s3.region=eu-north-1

# JWT ? dummyvðrden f—r tester
jwt.secret=test-secret-key-minst-32-tecken-lang-for-tester
jwt.expiration-ms=86400000

# Mindre output i tester
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false